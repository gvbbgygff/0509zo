name: Zo Verify API Test

on:
  workflow_dispatch:

jobs:
  test_verify:
    runs-on: ubuntu-latest

    steps:
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🧪 Run verify API test
        run: |
          python - << 'EOF'
          import requests

          # ✅ ⚠️ 必须换成“最新邮件里的 verify 链接”
          url = """https://www.zo.computer/api/email-login/verify?redirect=%2Fsignup%3Fintent%3Dlogin&token=你的最新token"""

          session = requests.Session()

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9",
              "Accept-Language": "en-US,en;q=0.9",
              "Connection": "keep-alive"
          }

          print("🚀 开始请求 verify...\n")

          try:
              resp = session.get(
                  url,
                  headers=headers,
                  allow_redirects=True,
                  timeout=30
              )

              print("✅ 请求完成\n")

              print("===== 基本信息 =====")
              print("✅ 状态码:", resp.status_code)
              print("📍 最终URL:", resp.url)

              print("\n===== Cookies =====")
              cookies = session.cookies.get_dict()
              print("🍪 Cookies:", cookies)
              print("📏 Cookie数量:", len(cookies))

              print("\n===== 响应内容预览 =====")
              print(resp.text[:300])

              print("\n===== 判定结果 =====")

              # ✅ 是否拿到cookie
              if len(cookies) == 0:
                  print("❌ 没拿到cookie → API可能被拦")
              else:
                  print("✅ 已拿到cookie")

              # ✅ 是否Cloudflare页面
              if "Cloudflare" in resp.text or "Verifying your browser" in resp.text:
                  print("❌ 返回Cloudflare验证页面 → 失败")
              else:
                  print("✅ 没有Cloudflare拦截")

              # ✅ 是否跳转
              if "verify" not in resp.url:
                  print("✅ 已成功跳转离开verify")
              else:
                  print("⚠️ 仍在verify页面（可能没问题）")

              # ✅ 最终判断
              if len(cookies) > 0 and "Cloudflare" not in resp.text:
                  print("\n🎉 ✅ ✅ ✅ 最终结论：可以完全不用浏览器")
              else:
                  print("\n💥 ❌ ❌ ❌ 最终结论：API方案不可用")

          except Exception as e:
              print("❌ 请求异常:", e)

          EOF
