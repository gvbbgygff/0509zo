import requests

# ✅ 替换成你的最新 verify 链接（一定要新！）
url = """https://www.zo.computer/api/email-login/verify?redirect=%2Fsignup%3Fintent%3Dlogin&token=你的token"""

session = requests.Session()

headers = {
    "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)",
    "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9",
    "Accept-Language": "en-US,en;q=0.9",
    "Connection": "keep-alive",
}

print("🚀 开始请求 verify...\n")

try:
    resp = session.get(
        url,
        headers=headers,
        allow_redirects=True,
        timeout=30
    )

    print("✅ 请求完成\n")

    print("===== 基本信息 =====")
    print("✅ 状态码:", resp.status_code)
    print("📍 最终URL:", resp.url)

    print("\n===== Cookies =====")
    cookies = session.cookies.get_dict()
    print("🍪 Cookies:", cookies)
    print("📏 Cookie数量:", len(cookies))

    print("\n===== 响应内容检查 =====")
    text_preview = resp.text[:300]
    print("📄 前300字符:\n", text_preview)

    print("\n===== 判定结果 =====")

    # ✅ 判定1：是否拿到cookie
    if len(cookies) == 0:
        print("❌ 失败：没有拿到 cookie（API 可能被拦）")
    else:
        print("✅ 已拿到 cookie")

    # ✅ 判定2：是否 Cloudflare 拦截
    if "Verifying your browser" in resp.text or "Cloudflare" in resp.text:
        print("❌ 失败：返回 Cloudflare 验证页面（被风控）")
    else:
        print("✅ 未返回 Cloudflare 页面")

    # ✅ 判定3：是否成功跳转
    if "verify" not in resp.url:
        print("✅ 已跳转离开 verify（理想情况）")
    else:
        print("⚠️ 仍停留 verify（但不一定失败）")

    # ✅ 最终结论
    if len(cookies) > 0 and "Cloudflare" not in resp.text:
        print("\n🎉 ✅ ✅ ✅ 最终结论：可以彻底不用浏览器（成功）")
    else:
        print("\n💥 ❌ ❌ ❌ 最终结论：API 方案不可用")

except Exception as e:
    print("❌ 请求异常:", e)
