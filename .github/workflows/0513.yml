name: Zo Full Auto Loop (Debug + Test)

on:
  workflow_dispatch:

jobs:
  # ✅ ✅ ✅ 先跑这个：验证能不能不用浏览器
  test_verify:
    runs-on: ubuntu-latest

    steps:
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install deps
        run: pip install requests

      - name: 🧪 Run verify test
        run: |
          python - << 'EOF'
          import requests

          url = """https://www.zo.computer/api/email-login/verify?redirect=%2Fsignup%3Fintent%3Dlogin&token=eyJhbGciOiJFUzI1NiIsImtpZCI6IjkxYmU5Yjk3LTMzM2ItNDQxMC04NmEwLTUyYTUyNzAwZDcxNSIsInR5cCI6IkpXVCJ9.eyJlbWFpbCI6IjEzODU3NjEwNjYxQDEzOS5jb20iLCJub25jZSI6IjU4ZWUyZTE3LThhNzktNDdkNC04ZmQyLTQ5MWFmOTQzZTU5NiIsImV4cCI6MTc3OTU4NDE4OCwiaXNzIjoiaHR0cHM6Ly9hdXRoLnpvLmNvbXB1dGVyIiwiYXVkIjoib24tc3Vic3RyYXRlIn0.WS82vo61Tct59GnFzNwtreHbpE6ngUmkpB7UQwLqXuN119OR1R4iIun2WyJDmYSz6LPoArGZjIduaWOsNLJ5Xg"""

          session = requests.Session()

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)",
              "Accept": "text/html,application/xhtml+xml",
              "Accept-Language": "en-US,en;q=0.9",
              "Connection": "keep-alive"
          }

          try:
              print("🚀 请求 verify...")

              resp = session.get(
                  url,
                  headers=headers,
                  allow_redirects=True,
                  timeout=30
              )

              print("✅ 状态码:", resp.status_code)
              print("📍 最终URL:", resp.url)

              cookies = session.cookies.get_dict()
              print("🍪 cookies:", cookies)

              print("📏 cookie数量:", len(cookies))

              if len(cookies) > 0:
                  print("\n✅ ✅ ✅ 结论：可以不用浏览器")
              else:
                  print("\n❌ ❌ ❌ 结论：API也被拦")

          except Exception as e:
              print("❌ 出错:", e)
          EOF
