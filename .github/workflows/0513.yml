name: Zo Browser Verify Test

on:
  workflow_dispatch:

jobs:
  test_browser:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install deps
        run: |
          npm init -y
          npm install cloakbrowser

      - name: 📝 Write test script
        run: |
          cat > test.js << 'EOF'
          import { launch } from 'cloakbrowser';

          const VERIFY_URL = `https://freecloud.ltd/login`;

          (async () => {
            const browser = await launch({
              headless: true // ⚠️ Actions必须headless
            });

            const page = await browser.newPage();

            try {
              console.log("🌐 打开 verify...");
              await page.goto(VERIFY_URL, { waitUntil: "domcontentloaded", timeout: 60000 });

              await page.waitForTimeout(15000);

              console.log("📍 当前URL:", await page.url());

              await page.screenshot({ path: "01_page.png", fullPage: true });

              // ✅ 模拟用户行为（即使在Actions也尝试）
              await page.mouse.move(200, 200);
              await page.mouse.move(800, 500);
              await page.waitForTimeout(5000);

              await page.screenshot({ path: "02_after_action.png", fullPage: true });

              console.log("🔍 查找域名...");

              const DOMAIN = "139.zo.computer";
              const locator = page.locator(`:has-text("${DOMAIN}")`);

              if (await locator.count() > 0) {
                console.log("🎉 ✅ 找到域名！");
              } else {
                console.log("❌ 未找到域名（大概率被CF挡）");
              }

            } catch (e) {
              console.log("❌ 错误:", e);
              try {
                await page.screenshot({ path: "99_error.png" });
              } catch {}
            }

            await browser.close();
          })();
          EOF

      - name: 🚀 Run test
        run: node test.js

      - name: 📂 List files
        if: always()
        run: |
          ls -la

      - name: 📤 Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-debug
          path: |
            *.png
